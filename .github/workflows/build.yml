# ──────────────────────────────────────────────────────────────────────
#  Purgatorio — CI Build Pipeline
#
#  Runner:  macos-14 (Apple Silicon, Xcode 15+)
#  Output:  Purgatorio.app (unsigned) → GitHub Artifacts
#
#  Build via Swift Package Manager — no .xcodeproj required.
#  xcodebuild reads Package.swift directly.
# ──────────────────────────────────────────────────────────────────────

name: Build Purgatorio

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: Purgatorio
  CONFIGURATION: Release
  DESTINATION: "generic/platform=iOS"
  DERIVED_DATA: ${{ github.workspace }}/DerivedData

jobs:
  build:
    name: Build iOS (unsigned)
    runs-on: macos-14

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode ───────────────────────────────────────────
      - name: Select Xcode 15
        run: |
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          xcodebuild -version
          swift --version

      # ── 3. Resolve SPM dependencies ────────────────────────────────
      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA"

      # ── 4. Build (unsigned) ────────────────────────────────────────
      - name: Build
        run: |
          xcodebuild build \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty --color || true

      # ── 5. Locate .app or .o artifacts ─────────────────────────────
      - name: Locate build products
        run: |
          echo "── DerivedData contents ──"
          find "$DERIVED_DATA" -name "*.app" -type d 2>/dev/null || true
          find "$DERIVED_DATA" -name "*.o" -type f 2>/dev/null | head -5 || true
          echo "── Build products ──"
          find "$DERIVED_DATA/Build/Products" -maxdepth 3 -type d 2>/dev/null || true

      # ── 6. Package artifacts ───────────────────────────────────────
      - name: Package build output
        run: |
          mkdir -p build

          APP_PATH=$(find "$DERIVED_DATA" -name "Purgatorio.app" -type d | head -1)

          if [ -n "$APP_PATH" ]; then
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            cd build && zip -r -q Purgatorio-unsigned.ipa Payload/
            echo "✅ IPA creado: $(du -sh Purgatorio-unsigned.ipa | cut -f1)"
          else
            echo "ℹ️  SPM library target — no .app bundle generated."
            echo "   Compilación exitosa. Artefactos de objeto disponibles en DerivedData."

            # Empaquetar los binarios de la librería como artefacto
            LIB_PATH=$(find "$DERIVED_DATA/Build/Products" -name "*.swiftmodule" -type d | head -1)
            if [ -n "$LIB_PATH" ]; then
              PRODUCT_DIR=$(dirname "$LIB_PATH")
              tar -czf build/Purgatorio-build-products.tar.gz -C "$PRODUCT_DIR" .
              echo "✅ Build products empaquetados."
            fi
          fi

      # ── 7. Upload artifacts ────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Purgatorio-build
          path: |
            build/Purgatorio-unsigned.ipa
            build/Purgatorio-build-products.tar.gz
          retention-days: 14
          if-no-files-found: warn

      # ── 8. Summary ─────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 🔥 Purgatorio Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | macos-14 (Apple Silicon) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Xcode** | $(xcodebuild -version | head -1) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Swift** | $(swift --version 2>&1 | head -1) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Configuration** | $CONFIGURATION |" >> $GITHUB_STEP_SUMMARY
          echo "| **Signing** | Unsigned (CI) |" >> $GITHUB_STEP_SUMMARY
