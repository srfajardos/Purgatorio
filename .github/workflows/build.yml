# ──────────────────────────────────────────────────────────────────────
#  Purgatorio — CI Build Pipeline
#
#  Runner:  macos-14 (Apple Silicon, Xcode 15+)
#  Output:  Purgatorio.app (unsigned) → GitHub Artifacts
#
#  Build via Swift Package Manager — no .xcodeproj required.
#  xcodebuild reads Package.swift directly.
# ──────────────────────────────────────────────────────────────────────

name: Build Purgatorio

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: Purgatorio
  CONFIGURATION: Release
  DESTINATION: "generic/platform=iOS"
  DERIVED_DATA: ${{ github.workspace }}/build

jobs:
  build:
    name: Build iOS (unsigned)
    runs-on: macos-14

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode ───────────────────────────────────────────
      - name: Select Xcode 15
        run: |
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          xcodebuild -version
          swift --version

      # ── 3. Generation (XcodeGen) ───────────────────────────────────
      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          xcodegen generate

      # ── 4. Build (unsigned) ────────────────────────────────────────
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Purgatorio.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO | xcpretty --color

      # ── 5. Locate .app or .o artifacts ─────────────────────────────
      - name: Locate build products
        run: |
          echo "── DerivedData contents ──"
          find "$DERIVED_DATA" -name "*.app" -type d 2>/dev/null || true
          find "$DERIVED_DATA" -name "*.o" -type f 2>/dev/null | head -5 || true
          echo "── Build products ──"
          find "$DERIVED_DATA/Build/Products" -maxdepth 3 -type d 2>/dev/null || true

      # ── 6. Package artifacts ───────────────────────────────────────
      - name: Package build output
        run: |
          mkdir -p build/Payload
          cp -R "DerivedData/Build/Products/Release-iphoneos/Purgatorio.app" build/Payload/
          cd build && zip -r Purgatorio-unsigned.ipa Payload

      # ── 7. Upload artifacts ────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Purgatorio-build
          path: build/Purgatorio-unsigned.ipa
          retention-days: 14
          if-no-files-found: warn

      # ── 8. Summary ─────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 🔥 Purgatorio Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | macos-14 (Apple Silicon) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Xcode** | $(xcodebuild -version | head -1) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Swift** | $(swift --version 2>&1 | head -1) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Configuration** | $CONFIGURATION |" >> $GITHUB_STEP_SUMMARY
          echo "| **Signing** | Unsigned (CI) |" >> $GITHUB_STEP_SUMMARY
