# ──────────────────────────────────────────────────────────────────────
#  Purgatorio — CI Build Pipeline
#
#  Runner:  macos-14 (Apple Silicon, Xcode 15+)
#  Output:  Purgatorio.app (unsigned) → GitHub Artifacts
#
#  El proyecto no usa SPM, CocoaPods ni Carthage.
#  Todos los frameworks son del SDK de iOS (PhotoKit, Metal, CoreMotion,
#  CoreHaptics, AVFoundation, AuthenticationServices, Vision).
# ──────────────────────────────────────────────────────────────────────

name: Build Purgatorio

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: Purgatorio
  PROJECT: Purgatorio.xcodeproj
  CONFIGURATION: Release
  DESTINATION: "generic/platform=iOS"
  SDK: iphoneos
  DERIVED_DATA: ${{ github.workspace }}/DerivedData
  ARCHIVE_PATH: ${{ github.workspace }}/build/Purgatorio.xcarchive

jobs:
  build:
    name: Build iOS (unsigned)
    runs-on: macos-14

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ────────────────────────────────────
      - name: Select Xcode 15
        run: |
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          xcodebuild -version
          swift --version

      # ── 3. Generate Xcode project (if not present) ─────────────────
      #
      # El proyecto es Swift puro sin .xcodeproj.
      # Generamos el proyecto con un script que crea el pbxproj mínimo.
      # Si ya existe un .xcodeproj en el repo, este paso se salta.
      #
      - name: Generate Xcode project
        run: |
          if [ ! -d "$PROJECT" ]; then
            echo "⚠️  No se encontró $PROJECT. Generando proyecto Xcode..."

            # Crear un Package.swift temporal para generar xcodeproj vía SPM
            cat > Package.swift << 'PACKAGE_EOF'
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Purgatorio",
              platforms: [.iOS(.v17)],
              targets: [
                  .executableTarget(
                      name: "Purgatorio",
                      path: "Purgatorio",
                      resources: [.process("Metal")]
                  )
              ]
          )
          PACKAGE_EOF

            swift package generate-xcodeproj
            echo "✅ Proyecto Xcode generado."
          else
            echo "✅ $PROJECT encontrado en el repositorio."
          fi

      # ── 4. Resolve SPM dependencies (if any) ──────────────────────
      - name: Resolve dependencies
        run: |
          if [ -f "Package.swift" ] || [ -f "$PROJECT/project.pbxproj" ]; then
            xcodebuild -resolvePackageDependencies \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -derivedDataPath "$DERIVED_DATA" \
              || echo "⚠️  No SPM dependencies to resolve (expected)."
          fi

      # ── 5. List available schemes ──────────────────────────────────
      - name: List schemes
        run: |
          xcodebuild -project "$PROJECT" -list

      # ── 6. Build for iOS (CODE_SIGNING_ALLOWED=NO) ─────────────────
      #
      # CODE_SIGNING_ALLOWED=NO permite compilar sin provisioning profile.
      # El resultado es un .app unsigned pero funcional para testing/CI.
      #
      - name: Build (unsigned)
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA" \
            -sdk "$SDK" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty --color || true

      # ── 7. Archive (unsigned .xcarchive → .app) ────────────────────
      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA" \
            -archivePath "$ARCHIVE_PATH" \
            -sdk "$SDK" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty --color || true

      # ── 8. Extract .app from archive ───────────────────────────────
      - name: Extract .app
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find "$ARCHIVE_PATH" -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "⚠️  No .app found in archive. Falling back to DerivedData..."
            APP_PATH=$(find "$DERIVED_DATA" -name "Purgatorio.app" -type d | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" build/Payload/
            echo "✅ .app extraído: $(du -sh build/Payload/*.app | cut -f1)"
          else
            echo "❌ No se encontró Purgatorio.app"
            exit 1
          fi

      # ── 9. Create unsigned .ipa ────────────────────────────────────
      - name: Package .ipa (unsigned)
        run: |
          cd build
          zip -r -q Purgatorio-unsigned.ipa Payload/
          ls -lh Purgatorio-unsigned.ipa
          echo "✅ IPA creado: $(du -sh Purgatorio-unsigned.ipa | cut -f1)"

      # ── 10. Upload .app artifact ───────────────────────────────────
      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Purgatorio-app
          path: build/Payload/Purgatorio.app
          retention-days: 14
          if-no-files-found: warn

      # ── 11. Upload .ipa artifact ───────────────────────────────────
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Purgatorio-ipa-unsigned
          path: build/Purgatorio-unsigned.ipa
          retention-days: 14
          if-no-files-found: warn

      # ── 12. Build summary ──────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 🔥 Purgatorio Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | macos-14 (Apple Silicon) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Xcode** | $(xcodebuild -version | head -1) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Swift** | $(swift --version | head -1) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Configuration** | $CONFIGURATION |" >> $GITHUB_STEP_SUMMARY
          echo "| **SDK** | $SDK |" >> $GITHUB_STEP_SUMMARY
          echo "| **Signing** | Unsigned (CI) |" >> $GITHUB_STEP_SUMMARY
          if [ -f "build/Purgatorio-unsigned.ipa" ]; then
            echo "| **IPA Size** | $(du -sh build/Purgatorio-unsigned.ipa | cut -f1) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Build succeeded**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **IPA not generated — check build logs**" >> $GITHUB_STEP_SUMMARY
          fi
