name: Purgatorio
options:
  bundleIdPrefix: com.srfajardos
targets:
  Purgatorio:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Purgatorio
    info:
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSPhotoLibraryUsageDescription: "Purgatorio necesita acceso a tus fotos para analizarlas y ejecutar el motor de destrucción."
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.srfajardos.Purgatorio
      SWIFT_STRICT_CONCURRENCY: complete
